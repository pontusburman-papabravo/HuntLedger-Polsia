<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Dark background -->
  <circle cx="60" cy="60" r="59" fill="#1a2e1a"/>
  <!-- Outer ring -->
  <circle cx="60" cy="60" r="56" fill="none" stroke="#c8a96e" stroke-width="2.5"/>
  <!-- Inner dashed ring -->
  <circle cx="60" cy="60" r="51" fill="none" stroke="#c8a96e" stroke-width="0.8" stroke-dasharray="3 2"/>

  <!-- Grade label -->
  <text x="60" y="24" text-anchor="middle" fill="#c8a96e" font-family="Georgia,Times New Roman,serif" font-size="10" font-weight="700" letter-spacing="2">GULD</text>

  <!-- Left antler main beam -->
  <path d="M49 57 L43 43 L37 33" stroke="#c8a96e" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Left antler tines -->
  <path d="M43 43 L35 45" stroke="#c8a96e" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M43 43 L41 36" stroke="#c8a96e" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M49 57 L44 50" stroke="#c8a96e" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Right antler main beam -->
  <path d="M71 57 L77 43 L83 33" stroke="#c8a96e" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right antler tines -->
  <path d="M77 43 L85 45" stroke="#c8a96e" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M77 43 L79 36" stroke="#c8a96e" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M71 57 L76 50" stroke="#c8a96e" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Ears -->
  <path d="M48 61 L42 52 L49 56" stroke="#c8a96e" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M72 61 L78 52 L71 56" stroke="#c8a96e" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Head oval -->
  <ellipse cx="60" cy="65" rx="12" ry="9" stroke="#c8a96e" stroke-width="2" fill="none"/>
  <!-- Eyes -->
  <circle cx="53.5" cy="62" r="1.8" fill="#c8a96e"/>
  <circle cx="66.5" cy="62" r="1.8" fill="#c8a96e"/>

  <!-- Moose muzzle (large, drooping) -->
  <path d="M49 70 Q49 82 60 83 Q71 82 71 70" stroke="#c8a96e" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Nostrils -->
  <ellipse cx="56" cy="79" rx="2.2" ry="1.5" stroke="#c8a96e" stroke-width="1.5" fill="none"/>
  <ellipse cx="64" cy="79" rx="2.2" ry="1.5" stroke="#c8a96e" stroke-width="1.5" fill="none"/>

  <!-- Bottom label -->
  <text x="60" y="101" text-anchor="middle" fill="#c8a96e" font-family="Arial,Helvetica,sans-serif" font-size="6.5" font-weight="600" letter-spacing="1.5">&#196;LGSKYTTEM&#196;RKET</text>
</svg>
