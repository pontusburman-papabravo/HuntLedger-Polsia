steps:
  # 1. Install dependencies
  - name: 'node:20'
    entrypoint: npm
    args: ['install', '--legacy-peer-deps']

  # 2. Build Backend (API) via konfigurationsfil
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud builds submit --config=apps/api/api-build.yaml --logging=cloud .
        gcloud run deploy huntledger-api \
          --image=europe-north1-docker.pkg.dev/$PROJECT_ID/huntledger-repo/api \
          --region=europe-north1 \
          --platform=managed \
          --allow-unauthenticated \
          --quiet

  # 3. Build Frontend (Web) via konfigurationsfil
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        BACKEND_URL=$(gcloud run services describe huntledger-api --region=europe-north1 --format='value(status.url)')
        gcloud builds submit --config=apps/web/web-build.yaml --logging=cloud .
        gcloud run deploy huntledger-web \
          --image=europe-north1-docker.pkg.dev/$PROJECT_ID/huntledger-repo/web \
          --region=europe-north1 \
          --platform=managed \
          --allow-unauthenticated \
          --quiet

options:
  logging: CLOUD_LOGGING_ONLY
