steps:
  # 1. Install dependencies from root
  - name: 'node:20'
    entrypoint: npm
    args: ['install', '--legacy-peer-deps']

  # 2. Build and deploy Backend (API)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Vi använder --dockerfile och ser till att sökvägen är korrekt
        gcloud builds submit . \
          --tag europe-north1-docker.pkg.dev/$PROJECT_ID/huntledger-repo/api \
          --dockerfile=apps/api/Dockerfile \
          --logging=cloud
        
        gcloud run deploy huntledger-api \
          --image europe-north1-docker.pkg.dev/$PROJECT_ID/huntledger-repo/api \
          --region europe-north1 \
          --platform managed \
          --allow-unauthenticated

  # 3. Build and deploy Frontend (Web)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        BACKEND_URL=$(gcloud run services describe huntledger-api --region europe-north1 --format='value(status.url)')
        
        gcloud builds submit . \
          --tag europe-north1-docker.pkg.dev/$PROJECT_ID/huntledger-repo/web \
          --set-env-vars "VITE_API_URL=$$BACKEND_URL" \
          --dockerfile=apps/web/Dockerfile \
          --logging=cloud
          
        gcloud run deploy huntledger-web \
          --image europe-north1-docker.pkg.dev/$PROJECT_ID/huntledger-repo/web \
          --region europe-north1 \
          --platform managed \
          --allow-unauthenticated

options:
  logging: CLOUD_LOGGING_ONLY
