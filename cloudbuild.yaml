steps:
  # 1. Bygg Backend-image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'europe-north1-docker.pkg.dev/$PROJECT_ID/huntledger-repo/api', '-f', 'apps/api/Dockerfile', '.']

  # 2. Push Backend-image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'europe-north1-docker.pkg.dev/$PROJECT_ID/huntledger-repo/api']

  # 3. Deploy Backend till Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'huntledger-api'
      - '--image=europe-north1-docker.pkg.dev/$PROJECT_ID/huntledger-repo/api'
      - '--region=europe-north1'
      - '--platform=managed'
      - '--allow-unauthenticated'

  # 4. Bygg Frontend-image
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Notera $$ här för att bash ska hantera variabeln
        BACKEND_URL=$(gcloud run services describe huntledger-api --region=europe-north1 --format='value(status.url)')
        docker build \
          -t europe-north1-docker.pkg.dev/$PROJECT_ID/huntledger-repo/web \
          --build-arg VITE_API_URL=$$BACKEND_URL \
          -f apps/web/Dockerfile .

  # 5. Push Frontend-image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'europe-north1-docker.pkg.dev/$PROJECT_ID/huntledger-repo/web']

  # 6. Deploy Frontend till Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'huntledger-web'
      - '--image=europe-north1-docker.pkg.dev/$PROJECT_ID/huntledger-repo/web'
      - '--region=europe-north1'
      - '--platform=managed'
      - '--allow-unauthenticated'

options:
  logging: CLOUD_LOGGING_ONLY
